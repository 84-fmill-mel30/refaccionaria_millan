<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPart System V7 — Spot Publicitario</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100vh; overflow: hidden; background: #020609; font-family: 'Barlow Condensed', sans-serif; }

        /* ── ESCENARIO ── */
        #stage { width: 100%; height: 100%; position: relative; overflow: hidden; }

        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(245,166,35,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(245,166,35,.04) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* ── SISTEMA DE SLIDES (CAPAS) ── */
        .slide {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transform: scale(1.1);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5; padding: 40px; text-align: center;
        }

        /* Pantalla Activa */
        .slide.active {
            opacity: 1; visibility: visible;
            transform: scale(1);
            z-index: 10;
        }

        /* Pantalla que se va */
        .slide.out {
            opacity: 0; visibility: hidden;
            transform: scale(0.9);
            z-index: 1;
        }

        /* ── DISEÑO DE TEXTOS ── */
        .brand { font-size: 70px; font-weight: 900; color: #F5A623; letter-spacing: 10px; text-shadow: 0 0 30px rgba(245, 166, 35, 0.5); }
        .tagline { color: #00D4FF; font-size: 20px; letter-spacing: 5px; }
        .feat-title { font-size: 50px; color: white; text-transform: uppercase; margin: 20px 0; }
        .gold { color: #F5A623; }

        /* ── VIDEO / IMAGEN DE FONDO ── */
        .media-bg {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: -1;
        }

        /* ── UI ── */
        #progress-bar { position: fixed; bottom: 0; left: 0; height: 4px; background: #F5A623; transition: width 0.4s; z-index: 100; }
        #skip-btn { position: fixed; bottom: 20px; right: 20px; background: rgba(245,166,35,0.2); color: white; border: 1px solid #F5A623; padding: 10px 20px; cursor: pointer; border-radius: 5px; z-index: 100; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="TU_AUDIO.mp3" type="audio/mpeg">
    </audio>

    <div id="stage">
        <div class="bg-grid"></div>

        <div class="slide" id="s1">
            <div class="brand">PROPART</div>
            <div class="tagline">SYSTEM V7</div>
            <p style="color: #6880A0; margin-top: 20px;">DIAGNÓSTICO PROFESIONAL</p>
        </div>

        <div class="slide" id="s2">
            <div class="feat-title">¿CUÁNTO CUESTA <span style="color:#FF3D5A">NO SABER?</span></div>
            <p style="color: #A0BCD8; font-size: 24px;">Pérdida de clientes y horas de trabajo desperdiciadas.</p>
        </div>

        <div class="slide" id="s3">
            <video class="media-bg" autoplay muted loop playsinline>
                <source src="TU_VIDEO.mp4" type="video/mp4">
            </video>
            <div class="feat-title">LA SOLUCIÓN <span class="gold">TOTAL</span></div>
            <p style="color: #A0BCD8; font-size: 24px;">Base de datos OEM y Chalán IA en tu bolsillo.</p>
        </div>

        <div class="slide" id="s4">
            <div class="brand" style="font-size: 50px;">CONTACTA AHORA</div>
            <div class="tagline" style="font-size: 30px; margin: 20px 0;">777-683-8196</div>
            <div style="background: #F5A623; color: black; padding: 15px 30px; font-weight: 900; display: inline-block; border-radius: 50px;">ALPUYECA, MORELOS</div>
        </div>
    </div>

    <div id="progress-bar" style="width: 0%;"></div>
    <button id="skip-btn" onclick="nextSlide()">SIGUIENTE →</button>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        const TIMING = [4000, 5000, 5000, 8000]; // Duración por slide
        let timer;

        function showSlide(n) {
            // Limpiar estados
            slides.forEach(s => {
                s.classList.remove('active');
                s.classList.remove('out');
            });

            // La anterior sale
            if (slides[current]) {
                slides[current].classList.add('out');
            }

            // La nueva entra
            current = n;
            slides[current].classList.add('active');

            // Actualizar UI
            document.getElementById('progress-bar').style.width = ((current + 1) / slides.length * 100) + "%";

            // Programar siguiente
            resetTimer();
        }

        function nextSlide() {
            // Activar audio
            const audio = document.getElementById('bgMusic');
            if(audio.paused) audio.play().catch(e => {});

            let next = (current + 1) % slides.length;
            showSlide(next);
        }

        function resetTimer() {
            clearTimeout(timer);
            if (TIMING[current] > 0) {
                timer = setTimeout(nextSlide, TIMING[current]);
            }
        }

        // Iniciar
        window.onload = () => {
            showSlide(0);
        };
    </script>
</body>
</html>
